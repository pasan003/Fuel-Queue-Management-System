<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Fuel Queue System</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-body">

<!-- Top Car -->
<i class="fa-solid fa-car car car-top"></i>

<!-- Bottom Car -->
<i class="fa-solid fa-car car car-bottom"></i>

<div class="auth-card login-card">
    <h3 class="login-title">🚗 Fuel Queue System</h3>

    <!-- Form posts via JS (fetch) to backend/login.php; keeps PHP session cookie -->
    <form id="loginForm" method="post" action="../backend/login.php" novalidate>
        <div class="mb-3">
            <label class="form-label" for="username">Email</label>
            <input type="email" class="form-control" id="username" name="username" placeholder="you@example.com" autocomplete="username">
            <div id="usernameError" class="error"></div>
        </div>

        <div class="mb-3 form-group">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" id="password" name="password" placeholder="Enter password">
            <i class="fa fa-eye toggle-password" aria-hidden="true"></i>
            <div id="passwordError" class="error"></div>
        </div>

        <button type="submit" class="btn btn-login w-100 text-white">Login</button>
    </form>

    <div class="links">
        <p><a href="#">Forgot Password?</a></p>
        <p>Don't have an account? <a href="register.html">Sign Up</a></p>
    </div>
</div>

<script src="js/auth.js"></script>

</body>
</html>
