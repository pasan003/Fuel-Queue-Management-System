<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Fuel Queue System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            overflow: hidden;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            position: relative;
        }

        .car {
            position: absolute;
            font-size: 26px;
            color: rgba(255,255,255,0.6);
            z-index: 0;
        }

        .car-top {
            top: 5%;
            animation: moveRight 10s linear infinite;
        }

        .car-bottom {
            bottom: 5%;
            animation: moveLeft 12s linear infinite;
        }

        @keyframes moveRight {
            0% { left: -60px; }
            100% { left: 110%; }
        }

        @keyframes moveLeft {
            0% { left: 110%; }
            100% { left: -60px; }
        }

        .register-card {
            position: relative;
            width: 100%;
            max-width: 440px;
            max-height: 92vh;
            padding: 35px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow:
                0 0 20px rgba(0, 255, 255, 0.2),
                inset 0 0 15px rgba(255, 255, 255, 0.05);
            color: #fff;
            z-index: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .register-scroll {
            overflow-y: auto;
            overflow-x: hidden;
            flex: 1;
            min-height: 0;
            padding-right: 6px;
            margin-right: -6px;
        }

        .register-scroll::-webkit-scrollbar {
            width: 6px;
        }

        .register-scroll::-webkit-scrollbar-thumb {
            background: rgba(0, 198, 255, 0.35);
            border-radius: 10px;
        }

        .register-title {
            text-align: center;
            margin-bottom: 20px;
            font-weight: bold;
            flex-shrink: 0;
        }

        .form-label { color: #ddd; }

        .form-control {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: #fff;
            border-radius: 10px;
        }

        .form-control::placeholder { color: #bbb; }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 10px rgba(0,255,255,0.5);
            color: #fff;
        }

        .btn-auth {
            background: linear-gradient(45deg, #00c6ff, #0072ff);
            border: none;
            border-radius: 10px;
            transition: 0.3s;
        }

        .btn-auth:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(0, 200, 255, 0.7);
        }

        .toggle-password {
            cursor: pointer;
            position: absolute;
            right: 15px;
            top: 38px;
            color: #ccc;
        }

        .form-group { position: relative; }

        .error {
            color: #ff6b6b;
            font-size: 0.85rem;
        }

        .links {
            text-align: center;
            margin-top: 15px;
            flex-shrink: 0;
        }

        .links a {
            text-decoration: none;
            font-size: 0.9rem;
            color: #ccc;
        }

        .links a:hover {
            color: #fff;
            text-decoration: underline;
        }

        /* User type toggle — matches login button gradient when active */
        .user-type-toggle {
            display: flex;
            gap: 10px;
            margin-bottom: 22px;
        }

        .user-type-btn {
            flex: 1;
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.08);
            color: #ddd;
            font-weight: 600;
            transition: 0.3s;
        }

        .user-type-btn:hover {
            color: #fff;
            border-color: rgba(0, 198, 255, 0.5);
            box-shadow: 0 0 12px rgba(0, 198, 255, 0.25);
        }

        .user-type-btn.active {
            background: linear-gradient(45deg, #00c6ff, #0072ff);
            color: #fff;
            border-color: transparent;
            box-shadow: 0 0 15px rgba(0, 200, 255, 0.5);
        }

        .section-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: rgba(255, 255, 255, 0.55);
            margin-bottom: 12px;
            margin-top: 4px;
        }

        .owner-panel {
            opacity: 0;
            max-height: 0;
            overflow: hidden;
            transform: translateY(-6px);
            transition: opacity 0.35s ease, max-height 0.45s ease, transform 0.35s ease;
        }

        .owner-panel.visible {
            opacity: 1;
            max-height: 1000px;
            transform: translateY(0);
        }

        .station-card {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 14px;
            padding: 16px 18px;
            margin-bottom: 6px;
        }

        .form-check-input {
            background-color: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.35);
        }

        .form-check-input:checked {
            background-color: #0072ff;
            border-color: #00c6ff;
        }

        .form-check-label { color: #ddd; }

        @media (max-width: 576px) {
            .register-card {
                max-width: 100%;
                margin: 12px;
                padding: 24px;
                max-height: calc(100vh - 24px);
            }
        }
    </style>
</head>
<body>

<i class="fa-solid fa-car car car-top"></i>
<i class="fa-solid fa-car car car-bottom"></i>

<div class="register-card">
    <h3 class="register-title">🚗 Create Account</h3>

    <div class="register-scroll">
        <form id="registerForm" novalidate>
            <div class="user-type-toggle" role="group" aria-label="Account type">
                <button type="button" class="user-type-btn active" id="btnCustomer" data-type="customer" aria-pressed="true">Customer</button>
                <button type="button" class="user-type-btn" id="btnOwner" data-type="owner" aria-pressed="false">Owner</button>
            </div>
            <input type="hidden" name="userType" id="userType" value="customer">

            <p class="section-label mb-2">Account details</p>

            <div class="mb-3">
                <label class="form-label" for="fullName">Full Name</label>
                <input type="text" class="form-control" id="fullName" name="fullName" placeholder="Enter your full name" autocomplete="name">
                <div id="fullNameError" class="error"></div>
            </div>

            <div class="mb-3">
                <label class="form-label" for="nationalId">National ID</label>
                <input type="text" class="form-control" id="nationalId" name="nationalId" placeholder="Enter national ID" autocomplete="off">
                <div id="nationalIdError" class="error"></div>
            </div>

            <div class="mb-3">
                <label class="form-label" for="email">Email</label>
                <input type="email" class="form-control" id="email" name="email" placeholder="Enter email" autocomplete="email">
                <div id="emailError" class="error"></div>
            </div>

            <div class="mb-3 form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" class="form-control" id="password" name="password" placeholder="Create a password" autocomplete="new-password">
                <i class="fa fa-eye toggle-password" id="togglePasswordIcon" onclick="toggleRegisterPassword()" aria-hidden="true"></i>
                <div id="passwordError" class="error"></div>
            </div>

            <div id="ownerPanel" class="owner-panel" aria-hidden="true">
                <p class="section-label">Fuel station</p>
                <div class="station-card">
                    <div class="mb-3 mb-lg-2">
                        <label class="form-label" for="stationName">Station Name</label>
                        <input type="text" class="form-control" id="stationName" name="stationName" placeholder="e.g. City Fuel Point" autocomplete="organization">
                        <div id="stationNameError" class="error"></div>
                    </div>
                    <div class="mb-0">
                        <label class="form-label" for="stationLocation">Station Location</label>
                        <input type="text" class="form-control" id="stationLocation" name="stationLocation" placeholder="Address or area" autocomplete="street-address">
                        <div id="stationLocationError" class="error"></div>
                    </div>
                    <div class="mt-3">
                        <label class="form-label d-block">Fuel types available</label>
                        <div class="d-flex flex-wrap gap-3 mt-2">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="fuelPetrol" name="fuelTypes" value="petrol">
                                <label class="form-check-label" for="fuelPetrol">Petrol</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="fuelDiesel" name="fuelTypes" value="diesel">
                                <label class="form-check-label" for="fuelDiesel">Diesel</label>
                            </div>
                        </div>
                        <div id="fuelTypesError" class="error mt-1"></div>
                    </div>
                </div>
            </div>

            <button type="submit" class="btn btn-auth w-100 text-white mt-1">Register</button>
        </form>
    </div>

    <div class="links">
        <p class="mb-0">Already have an account? <a href="login.html">Login</a></p>
    </div>
</div>

<script>
    const form = document.getElementById('registerForm');
    const userTypeInput = document.getElementById('userType');
    const btnCustomer = document.getElementById('btnCustomer');
    const btnOwner = document.getElementById('btnOwner');
    const ownerPanel = document.getElementById('ownerPanel');

    function setUserType(type) {
        const isOwner = type === 'owner';
        userTypeInput.value = type;
        btnCustomer.classList.toggle('active', !isOwner);
        btnOwner.classList.toggle('active', isOwner);
        btnCustomer.setAttribute('aria-pressed', String(!isOwner));
        btnOwner.setAttribute('aria-pressed', String(isOwner));

        ownerPanel.classList.toggle('visible', isOwner);
        ownerPanel.setAttribute('aria-hidden', String(!isOwner));

        if (!isOwner) {
            document.getElementById('stationName').value = '';
            document.getElementById('stationLocation').value = '';
            document.getElementById('fuelPetrol').checked = false;
            document.getElementById('fuelDiesel').checked = false;
            clearOwnerErrors();
        }
    }

    btnCustomer.addEventListener('click', function () {
        setUserType('customer');
    });

    btnOwner.addEventListener('click', function () {
        setUserType('owner');
    });

    function clearOwnerErrors() {
        ['stationNameError', 'stationLocationError', 'fuelTypesError'].forEach(function (id) {
            const el = document.getElementById(id);
            if (el) el.innerText = '';
        });
    }

    function toggleRegisterPassword() {
        const password = document.getElementById('password');
        const icon = document.getElementById('togglePasswordIcon');
        if (password.type === 'password') {
            password.type = 'text';
            icon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
            password.type = 'password';
            icon.classList.replace('fa-eye-slash', 'fa-eye');
        }
    }

    function isValidEmail(value) {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value);
    }

    form.addEventListener('submit', function (e) {
        e.preventDefault();

        const type = userTypeInput.value;
        let valid = true;

        const ids = ['fullName', 'nationalId', 'email', 'password', 'fullNameError', 'nationalIdError', 'emailError', 'passwordError'];
        ids.forEach(function (id) {
            const el = document.getElementById(id);
            if (el && id.endsWith('Error')) el.innerText = '';
        });
        clearOwnerErrors();

        const fullName = document.getElementById('fullName').value.trim();
        const nationalId = document.getElementById('nationalId').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        if (fullName === '') {
            document.getElementById('fullNameError').innerText = 'Full name is required';
            valid = false;
        }

        if (nationalId === '') {
            document.getElementById('nationalIdError').innerText = 'National ID is required';
            valid = false;
        }

        if (email === '') {
            document.getElementById('emailError').innerText = 'Email is required';
            valid = false;
        } else if (!isValidEmail(email)) {
            document.getElementById('emailError').innerText = 'Enter a valid email address';
            valid = false;
        }

        if (password === '') {
            document.getElementById('passwordError').innerText = 'Password is required';
            valid = false;
        } else if (password.length < 6) {
            document.getElementById('passwordError').innerText = 'Password must be at least 6 characters';
            valid = false;
        }

        if (type === 'owner') {
            const stationName = document.getElementById('stationName').value.trim();
            const stationLocation = document.getElementById('stationLocation').value.trim();
            const petrol = document.getElementById('fuelPetrol').checked;
            const diesel = document.getElementById('fuelDiesel').checked;

            if (stationName === '') {
                document.getElementById('stationNameError').innerText = 'Station name is required';
                valid = false;
            }
            if (stationLocation === '') {
                document.getElementById('stationLocationError').innerText = 'Station location is required';
                valid = false;
            }
            if (!petrol && !diesel) {
                document.getElementById('fuelTypesError').innerText = 'Select at least one fuel type';
                valid = false;
            }
        }

        if (valid) {
            const summary = type === 'owner'
                ? 'Owner registration (demo): ' + fullName + ' — station fields captured.'
                : 'Customer registration (demo): ' + fullName;
            alert(summary);
        }
    });
</script>

</body>
</html>
