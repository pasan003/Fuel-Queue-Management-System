<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Fuel Queue System</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-body">

<i class="fa-solid fa-car car car-top"></i>
<i class="fa-solid fa-car car car-bottom"></i>

<div class="auth-card register-card">
    <h3 class="register-title">🚗 Create Account</h3>

    <div class="register-scroll">
        <form id="registerForm" method="post" action="../backend/register.php" novalidate>
            <div class="user-type-toggle" role="group" aria-label="Account type">
                <button type="button" class="user-type-btn active" id="btnCustomer" data-type="customer" aria-pressed="true">Customer</button>
                <button type="button" class="user-type-btn" id="btnOwner" data-type="owner" aria-pressed="false">Owner</button>
            </div>
            <input type="hidden" name="userType" id="userType" value="customer">

            <p class="section-label mb-2">Account details</p>

            <div class="mb-3">
                <label class="form-label" for="fullName">Full Name</label>
                <input type="text" class="form-control" id="fullName" name="fullName" placeholder="Enter your full name" autocomplete="name">
                <div id="fullNameError" class="error"></div>
            </div>

            <div class="mb-3">
                <label class="form-label" for="nationalId">National ID</label>
                <input type="text" class="form-control" id="nationalId" name="nationalId" placeholder="Enter national ID" autocomplete="off">
                <div id="nationalIdError" class="error"></div>
            </div>

            <div class="mb-3">
                <label class="form-label" for="email">Email</label>
                <input type="email" class="form-control" id="email" name="email" placeholder="Enter email" autocomplete="email">
                <div id="emailError" class="error"></div>
            </div>

            <div class="mb-3 form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" class="form-control" id="password" name="password" placeholder="Create a password" autocomplete="new-password">
                <i class="fa fa-eye toggle-password" id="togglePasswordIcon" aria-hidden="true"></i>
                <div id="passwordError" class="error"></div>
            </div>

            <div id="ownerPanel" class="owner-panel" aria-hidden="true">
                <p class="section-label">Fuel station</p>
                <div class="station-card">
                    <div class="mb-3 mb-lg-2">
                        <label class="form-label" for="stationName">Station Name</label>
                        <input type="text" class="form-control" id="stationName" name="stationName" placeholder="e.g. City Fuel Point" autocomplete="organization">
                        <div id="stationNameError" class="error"></div>
                    </div>
                    <div class="mb-0">
                        <label class="form-label" for="stationLocation">Station Location</label>
                        <input type="text" class="form-control" id="stationLocation" name="stationLocation" placeholder="Address or area" autocomplete="street-address">
                        <div id="stationLocationError" class="error"></div>
                    </div>
                    <div class="mt-3">
                        <label class="form-label d-block">Fuel types available</label>
                        <div class="d-flex flex-wrap gap-3 mt-2">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="fuelPetrol" name="fuelTypes" value="petrol">
                                <label class="form-check-label" for="fuelPetrol">Petrol</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="fuelDiesel" name="fuelTypes" value="diesel">
                                <label class="form-check-label" for="fuelDiesel">Diesel</label>
                            </div>
                        </div>
                        <div id="fuelTypesError" class="error mt-1"></div>
                    </div>
                </div>
            </div>

            <button type="submit" class="btn btn-auth w-100 text-white mt-1">Register</button>
        </form>
    </div>

    <div class="links">
        <p class="mb-0">Already have an account? <a href="login.html">Login</a></p>
    </div>
</div>

<script src="js/auth.js"></script>

</body>
</html>
